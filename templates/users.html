<!DOCTYPE html>
<html>
<head>
    <title>Users</title>
</head>
<body>

<h1>Users</h1>

<table border="1" cellpadding="5">

    <tr>
        <th>Username</th>
        <th>Enabled</th>
        <th>Roles</th>
    </tr>

    {% for user in users %}
    <tr>
        <td>{{ user.username }}</td>
        <td>{{ user.enabled }}</td>
        <td>{{ ", ".join(user.roles) }}</td>
    </tr>
    {% endfor %}

</table>

<br>

<a href="/">Home</a>

</body>
</html>
